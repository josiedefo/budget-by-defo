# Neon PostgreSQL Configuration
# Activate with: -Dspring.profiles.active=neon
# Or set environment variable: SPRING_PROFILES_ACTIVE=neon

spring.datasource.url=${NEON_DATABASE_URL}
spring.datasource.username=${NEON_DATABASE_USERNAME}
spring.datasource.password=${NEON_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Neon requires SSL
spring.datasource.hikari.data-source-properties.sslmode=require

# Keep Liquibase running migrations on Neon
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true
